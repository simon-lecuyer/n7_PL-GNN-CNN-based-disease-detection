experiment_name: "gnn_temporal_v3"

data:
  train_path: "../data/data/processed/processed_20260226_133131/datasets/gnn/train_seq10.json"
  val_path: "../data/data/processed/processed_20260226_133131/datasets/gnn/val_seq10.json"
  test_path: "../data/data/processed/processed_20260226_133131/datasets/gnn/test_seq10.json"
  checkpoint_path: "../gnn/checkpoints"
  log_path: "../gnn/training_logs"

model:
  in_channels: 3    # 3 for temporal, 4 for spatial (since we add an `observed` feature)
  hidden_dim: 64
  num_layers: 2
  out_channels: 1
  dropout: 0.2
  type: "temporal"     # Options: "spatial", "temporal"

training:
  epochs: 10
  batch_size: 32
  lr: 0.001
  optimizer: "adam"
  device: "auto"      # Options: "auto", "cuda", "mps", "cpu"
  mask: 0.3
  seed: 42